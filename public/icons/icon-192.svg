<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="muse-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="muse-grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="url(#muse-grad)"/>
  <!-- Stylized "M" as music note -->
  <g transform="translate(28, 28)">
    <!-- Left stem of M -->
    <rect x="8" y="20" width="16" height="100" rx="8" fill="white" opacity="0.9"/>
    <!-- Right stem of M (taller) -->
    <rect x="72" y="10" width="16" height="110" rx="8" fill="white" opacity="0.9"/>
    <!-- Center V of M -->
    <polygon points="16,120 50,60 84,120" fill="white" opacity="0.9"/>
    <!-- Musical note detail - small circle -->
    <circle cx="20" cy="124" r="14" fill="white" opacity="0.3"/>
    <circle cx="84" cy="126" r="14" fill="white" opacity="0.3"/>
    <!-- Eighth note flag -->
    <path d="M80 10 Q96 10 100 30 Q104 40 96 45 Q92 48 90 40 Q88 32 84 30 L80 30" fill="white" opacity="0.6"/>
    <!-- Sparkle dots -->
    <circle cx="130" cy="30" r="4" fill="white" opacity="0.8"/>
    <circle cx="110" cy="140" r="3" fill="white" opacity="0.5"/>
    <circle cx="140" cy="90" r="5" fill="white" opacity="0.6"/>
  </g>
</svg>